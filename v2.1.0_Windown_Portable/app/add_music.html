<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曲を追加 - Chordia</title>
    
    <!-- 共通スタイル -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- 機能別CSS -->
    <link rel="stylesheet" href="css/add-music/base.css">
    <link rel="stylesheet" href="css/add-music/source.css">
    <link rel="stylesheet" href="css/add-music/artwork.css">
    <link rel="stylesheet" href="css/add-music/lyric.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="js/theme_head.js"></script>
</head>
<body>

    <div class="container-fluid add-music-layout">
        <header class="header form-header">
            <div class="header-left">
                <a href="index.html" class="back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                    トップへ戻る
                </a>
            </div>
            <div class="header-center">
                <h1>曲を追加</h1>
                <p class="subtitle">情報を設定してライブラリに楽曲を登録します</p>
            </div>
        </header>

        <form id="addMusicForm" class="main-split-container">
            
            <!-- 上段 1: 曲の情報 (JSで動的生成) -->
            <div class="pane pane-info">
                <h2 class="pane-title">曲の情報</h2>
                <div id="dynamicTagsContainer">
                    <!-- ここに設定で有効化されているタグの入力欄が生成されます -->
                </div>
            </div>

            <!-- 上段 2: 音源の設定 -->
            <div class="pane pane-source">
                <h2 class="pane-title">音源の設定 <span class="required">*</span></h2>
                
                <div class="source-selector">
                    <label class="radio-label">
                        <input type="radio" name="sourceType" value="local" checked>
                        <span>ローカルファイル</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="sourceType" value="download">
                        <span>動画ダウンロード</span>
                    </label>
                </div>

                <!-- ローカルファイルエリア -->
                <div id="sourceLocalArea" class="source-area active">
                    <label class="drop-zone file-drop" id="fileDropZone">
                        <input type="file" id="fileInput" accept=".mp3,.mp4" style="display: none;">
                        <div class="drop-content-vertical">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="drop-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                            </svg>
                            <p class="drop-text-main" id="fileName">MP3 / MP4 ファイルをドラッグ＆ドロップ</p>
                            <p class="drop-text-sub">または <span class="browse-link">クリックして参照</span></p>
                        </div>
                    </label>
                </div>

                <!-- 動画ダウンロードエリア -->
                <div id="sourceDownloadArea" class="source-area">
                    <div class="form-group" id="urlInputGroup">
                        <label for="videoUrl">動画のURL</label>
                        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
                        <button type="button" id="btnFetchVideoInfo" class="btn-fetch-info" style="margin-top: 10px;">動画情報を取得</button>
                    </div>

                    <div id="videoInfoDisplay" class="video-info-display" style="display: none;">
                        <div class="video-thumb-container">
                            <img id="videoThumb" src="" alt="Thumbnail">
                            <span id="videoDuration" class="video-duration">0:00</span>
                        </div>
                        <div id="videoTitleDisplay" class="video-title-display"></div>
                        <button type="button" id="btnCancelVideo" class="btn-cancel-video">この動画を使わない</button>
                    </div>
                </div>
            </div>

            <!-- 上段 3: アートワーク設定 -->
            <div class="pane pane-art">
                <h2 class="pane-title">アルバムアート</h2>
                
                <div class="art-tabs">
                    <button type="button" class="art-tab-btn active" data-target="art-local" title="ローカルの画像ファイル(PNG推奨)を選択します">ローカル</button>
                    <button type="button" class="art-tab-btn" data-target="art-extract" title="アップロードされた音源ファイルに埋め込まれているアルバムアートを抽出します">音源から抽出</button>
                    <button type="button" class="art-tab-btn" data-target="art-thumb1" title="ダウンロード元の動画サムネイルの中央をスクエアに切り取って使用します">元のサムネ</button>
                    <button type="button" class="art-tab-btn" data-target="art-thumb2" title="別の動画URLからサムネイルを取得します">別動画</button>
                    <button type="button" class="art-tab-btn" data-target="art-url" title="画像のURLから直接アルバムアートを設定します">画像URL</button>
                    <button type="button" class="art-tab-btn" data-target="art-none" title="アルバムアートを設定しません（初期アルバムアートが適用されます）">設定しない</button>
                </div>

                <div class="art-tab-content active" id="art-local">
                    <label class="drop-zone artwork-drop" id="artworkDropZone">
                        <input type="file" id="artworkInput" accept=".png" style="display: none;">
                        <div class="drop-content" id="artworkContent">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="drop-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                            </svg>
                            <p class="drop-text" style="font-size: 0.75rem;">PNG画像を選択</p>
                        </div>
                        <img id="artworkPreview" class="artwork-preview" src="" alt="Preview" style="display: none;">
                        <button type="button" id="removeArtwork" class="remove-btn" style="display: none;">×</button>
                    </label>
                </div>

                <div class="art-tab-content" id="art-extract">
                    <p class="desc-text" style="margin-bottom: 12px;">アップロードされたローカル音源ファイルからアルバムアートを抽出します。</p>
                    <button type="button" id="btnExtractArtwork" class="btn-secondary" style="width: 100%; margin-bottom: 12px;">抽出を実行</button>
                    <div style="display: flex; justify-content: center;">
                        <img id="extractPreview" src="icon/Chordia.png" alt="Extract Preview" style="width: 150px; height: 150px; object-fit: cover; border-radius: 12px; box-shadow: var(--shadow-md); display: none;">
                    </div>
                </div>

                <div class="art-tab-content" id="art-thumb1">
                    <p class="desc-text" style="margin-bottom: 12px;">ダウンロード元の動画サムネイルの中央をスクエアに切り取って使用します。</p>
                    <div id="thumb1PreviewContainer" style="display: none; flex-direction: column; align-items: center;">
                        <img id="thumb1Preview" src="" alt="Thumbnail Preview" style="width: 150px; height: 150px; object-fit: cover; border-radius: 12px; box-shadow: var(--shadow-md); margin-bottom: 12px;">
                        <button type="button" id="btnDownloadOrigThumb" class="btn-secondary" style="font-size: 0.85rem; padding: 6px 12px;">オリジナル画像をダウンロード</button>
                    </div>
                </div>

                <div class="art-tab-content" id="art-thumb2">
                    <div class="form-group">
                        <label>別の動画URL</label>
                        <input type="text" id="altVideoUrl" placeholder="https://www.youtube.com/watch?v=...">
                        <button type="button" id="btnFetchAltThumb" class="btn-secondary" style="margin-top: 8px; width: 100%;">サムネイルを取得</button>
                    </div>
                    <div style="display: flex; justify-content: center; margin-top: 12px;">
                        <img id="thumb2Preview" src="icon/Chordia.png" alt="Alt Thumbnail Preview" style="width: 150px; height: 150px; object-fit: cover; border-radius: 12px; box-shadow: var(--shadow-md); display: none;">
                    </div>
                </div>

                <div class="art-tab-content" id="art-url">
                    <div class="form-group">
                        <label>画像のURL</label>
                        <input type="text" id="imageUrl" placeholder="https://example.com/image.png">
                        <button type="button" id="btnPreviewImageUrl" class="btn-secondary" style="margin-top: 8px; width: 100%;">画像をプレビュー</button>
                    </div>
                    <div style="display: flex; justify-content: center; margin-top: 12px;">
                        <img id="urlPreview" src="icon/Chordia.png" alt="URL Preview" style="width: 150px; height: 150px; object-fit: cover; border-radius: 12px; box-shadow: var(--shadow-md); display: none;">
                    </div>
                </div>

                <div class="art-tab-content" id="art-none">
                    <p class="desc-text" style="color: var(--text-sub); font-style: italic; margin-bottom: 12px;">アルバムアートを設定しません。<br>以下のデフォルト画像が適用されます。</p>
                    <div style="display: flex; justify-content: center;">
                        <img src="icon/Chordia.png" alt="Default Preview" style="width: 150px; height: 150px; object-fit: cover; border-radius: 12px; box-shadow: var(--shadow-md);">
                    </div>
                </div>
            </div>

            <!-- 下段 全幅: 歌詞設定 -->
            <div class="pane pane-lyric">
                <div class="form-group-header">
                    <h2 class="pane-title" style="margin-bottom: 0; border: none; padding: 0;">歌詞</h2>
                    <button type="button" id="btnAutoLyric" class="btn-auto-lyric">歌詞を自動取得 (LRCLIB)</button>
                </div>
                <textarea id="lyric" class="custom-textarea" placeholder="ここに歌詞を入力してください..." rows="8"></textarea>
            </div>
            
            <!-- 下部アクション -->
            <div class="bottom-action-bar">
                <button type="submit" form="addMusicForm" class="btn-submit" id="btnSubmitAll">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    この設定で楽曲を追加
                </button>
            </div>
        </form>
    </div>

    <!-- 歌詞検索モーダル -->
    <div id="lyricSearchModal" class="modal-overlay" style="display: none;">
        <div class="modal-content lyric-modal">
            <div id="lyricSearchListView" class="modal-view">
                <h3>歌詞の検索結果</h3>
                <p style="font-size: 0.85rem; color: var(--text-sub); margin-bottom: 12px;">確認したい歌詞をクリックしてください。</p>
                <ul id="lyricResultList" class="lyric-result-list"></ul>
                <div class="modal-buttons" style="margin-top: 20px;">
                    <button type="button" id="btnCancelLyricSearch" class="btn-secondary" style="width: 100%;">歌詞を自動取得しない</button>
                </div>
            </div>
            <div id="lyricSearchDetailView" class="modal-view" style="display: none;">
                <h3>歌詞の確認</h3>
                <div id="lyricPreviewText" class="lyric-preview"></div>
                <div class="modal-buttons" style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="button" id="btnBackToResult" class="btn-secondary" style="flex: 1;">一覧に戻る</button>
                    <button type="button" id="btnApplyLyric" class="btn-primary" style="flex: 1;">この歌詞を適用</button>
                </div>
            </div>
        </div>
    </div>

    <!-- カスタムアラートモーダル -->
    <div id="alertModal" class="modal-overlay" style="display: none; z-index: 3000;">
        <div class="modal-content" style="width: 320px; padding: 30px; text-align: center;">
            <h3 style="margin-top: 0; color: var(--text-main); font-size: 1.2rem;">お知らせ</h3>
            <p id="alertMessage" style="color: var(--text-sub); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5;"></p>
            <button type="button" id="btnAlertOk" class="btn-primary" style="width: 100%;">OK</button>
        </div>
    </div>

    <!-- 全画面処理中オーバーレイ -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p id="loadingText" class="loading-text">楽曲を追加しています...</p>
        <p style="margin-top: 12px; color: var(--text-sub); font-size: 0.9rem;">このまましばらくお待ちください</p>
    </div>

    <!-- トースト通知 -->
    <div id="toast" class="toast"></div>

    <script type="text/javascript" src="/eel.js"></script>
    <script src="js/add-music/utils.js"></script>
    <script src="js/add-music/source.js"></script>
    <script src="js/add-music/artwork.js"></script>
    <script src="js/add-music/lyric.js"></script>
    <script src="js/add-music/main.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
