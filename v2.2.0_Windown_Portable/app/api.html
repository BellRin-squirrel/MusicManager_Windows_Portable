<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>iPhone 同期認証</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/api/api.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/theme_head.js"></script>
</head>
<body class="sync-body">
    <div class="container">
        <header class="header form-header">
            <h1>同期設定</h1>
        </header>

        <div class="card-large">
            <div id="viewMain">
                <h3>PCのIPアドレス</h3>
                <div class="ip-box"><span id="displayIp">取得中...</span></div>
                <p class="hint">iPhoneアプリでこのIPを入力するか、QRコードを表示して読み取ってください。</p>
                
                <div class="center-btn-area">
                    <button class="btn-primary" id="btnShowQr">QRコードを表示</button>
                </div>

                <div id="qr-wrapper" style="display:none;">
                    <div class="qr-bg-white">
                        <div id="qrcode-container"></div>
                    </div>
                    <br>
                    <button class="btn-text" id="btnHideQr">QRコードを隠す</button>
                </div>
            </div>
        </div>

        <div class="sessions-container">
            <h2>接続中のデバイス</h2>
            <ul id="sessionsList">
                <li class="no-sessions">接続中のデバイスはありません。</li>
            </ul>
        </div>
    </div>

    <div id="requestModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3 class="alert-title">接続要求がありました</h3>
            <div class="device-info-card">
                <!-- ★ 修正点: デバイス情報を表示する場所を1つにまとめる -->
                <p id="reqDeviceInfo">デバイス情報を待っています...</p>
            </div>
            <div id="approvalActions">
                <div class="btn-group">
                    <button class="btn-danger" id="btnReject">拒否</button>
                    <button class="btn-primary" id="btnApprove">許可する</button>
                </div>
            </div>
            <div id="codeDisplayArea" style="display:none;">
                <p>以下のコードをiPhoneに入力してください</p>
                <div class="auth-code-large" id="authCodeDisplay">------</div>
                <div class="countdown-bar">次まであと <span id="codeTimer">--</span>秒</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">デバイスが接続されました</div>

    <script type="text/javascript" src="/eel.js"></script>
    <script src="js/api/api.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
